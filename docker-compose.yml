services:
  nginx:
    image: nginx:alpine
    ports:
      - "5173:5173"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    # RED_HOLD remediation: Redis is internal-only — no host port exposure.
    # Access via Docker network: redis:6379 only.
    expose:
      - "6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD for Redis auth}
      --protected-mode yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - positron-data:/app/.positron
      - ${HOME}/.opencode/bin/opencode:/usr/local/bin/opencode:ro
      - ${HOME}/.local/share/uv/tools/specify-cli:${HOME}/.local/share/uv/tools/specify-cli:ro
      - ${HOME}/.config/opencode:/root/.config/opencode:ro
      - ${HOME}/.opencode:/root/.opencode
    environment:
      - PORT=3000
      - NODE_ENV=production
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:${HOME}/.local/share/uv/tools/specify-cli/bin:${HOME}/.local/share/uv/tools/specify-cli/bin
      - POSITRON_DB_PATH=/app/.positron/runs/positron.db
      - POSITRON_REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - GITHUB_TOKEN=${GITHUB_TOKEN:-ghp_fake}
      - POSITRON_GITHUB_MODE=${POSITRON_GITHUB_MODE:-fake}
      - POSITRON_SPECKIT_MODE=${POSITRON_SPECKIT_MODE:-fake}
      - POSITRON_OPENCODE_MODE=${POSITRON_OPENCODE_MODE:-fake}
      - POSITRON_REPO_OWNER=${POSITRON_REPO_OWNER:-xxammaxx}
      - POSITRON_REPO_NAME=${POSITRON_REPO_NAME:-Positron}
      - POSITRON_REPO_DEFAULT_BRANCH=${POSITRON_REPO_DEFAULT_BRANCH:-main}
      - POSITRON_ENABLE_PUSH=${POSITRON_ENABLE_PUSH:-false}
      - POSITRON_ENABLE_MERGE=${POSITRON_ENABLE_MERGE:-false}
      - POSITRON_MERGE_DRY_RUN=${POSITRON_MERGE_DRY_RUN:-true}
      - POSITRON_MERGE_KILL_SWITCH=true
      - POSITRON_ENABLE_FIX_LOOP=${POSITRON_ENABLE_FIX_LOOP:-false}
      - POSITRON_WORKSPACE_ROOT=/app/workspace
      # RED_HOLD remediation: No default token — must be explicitly set by operator.
      - POSITRON_ADMIN_TOKEN=${POSITRON_ADMIN_TOKEN:?set POSITRON_ADMIN_TOKEN in .env or env vars}
      - POSITRON_CORS_ORIGIN=${POSITRON_CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    volumes:
      - positron-data:/app/.positron
      - ${HOME}/.opencode/bin/opencode:/usr/local/bin/opencode:ro
      - ${HOME}/.local/share/uv/tools/specify-cli:${HOME}/.local/share/uv/tools/specify-cli:ro
      - ${HOME}/.config/opencode:/root/.config/opencode:ro
      - ${HOME}/.opencode:/root/.opencode
    environment:
      - NODE_ENV=production
      - POSITRON_DB_PATH=/app/.positron/runs/positron.db
      - POSITRON_REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:${HOME}/.local/share/uv/tools/specify-cli/bin
      - GITHUB_TOKEN=${GITHUB_TOKEN:-ghp_fake}
      - POSITRON_GITHUB_MODE=${POSITRON_GITHUB_MODE:-fake}
      - POSITRON_SPECKIT_MODE=${POSITRON_SPECKIT_MODE:-fake}
      - POSITRON_OPENCODE_MODE=${POSITRON_OPENCODE_MODE:-fake}
      - POSITRON_REPO_OWNER=${POSITRON_REPO_OWNER:-xxammaxx}
      - POSITRON_REPO_NAME=${POSITRON_REPO_NAME:-Positron}
      - POSITRON_REPO_DEFAULT_BRANCH=${POSITRON_REPO_DEFAULT_BRANCH:-main}
      - POSITRON_ENABLE_PUSH=${POSITRON_ENABLE_PUSH:-false}
      - POSITRON_ENABLE_MERGE=${POSITRON_ENABLE_MERGE:-false}
      - POSITRON_MERGE_DRY_RUN=${POSITRON_MERGE_DRY_RUN:-true}
      - POSITRON_MERGE_KILL_SWITCH=true
      - POSITRON_ENABLE_FIX_LOOP=${POSITRON_ENABLE_FIX_LOOP:-false}
      - POSITRON_WORKSPACE_ROOT=/app/workspace
      - POSITRON_ADMIN_TOKEN=${POSITRON_ADMIN_TOKEN:?set POSITRON_ADMIN_TOKEN in .env or env vars}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  positron-data:
  redis-data:
