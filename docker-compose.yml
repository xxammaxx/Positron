# Positron — Containerized Deployment MVP
# Single-service container: Web UI + API + SQLite in one container.
# Safe demo defaults: no secrets, fake adapters, tool gateway sealed,
# real run disabled, merge kill switch active.
#
# Quickstart:
#   docker compose up --build
#   → Web UI:  http://localhost:3000
#   → API:     http://localhost:3000/api/health
#   → Gates:   http://localhost:3000/api/infrastructure-gates/status
#   → Gateway: http://localhost:3000/api/tool-gateway/status

services:
  positron:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: positron
    ports:
      - "3000:3000"
    environment:
      - POSITRON_MODE=fake
      - POSITRON_GITHUB_MODE=fake
      - POSITRON_SPECKIT_MODE=fake
      - POSITRON_OPENCODE_MODE=fake
      - POSITRON_INFRASTRUCTURE_STORE=sqlite
      - POSITRON_ENABLE_REAL_RUN=false
      - POSITRON_ENABLE_TOOL_GATEWAY=false
      - POSITRON_MCP_EXPOSE_ENABLED=false
      - POSITRON_MERGE_KILL_SWITCH=true
      - POSITRON_ENABLE_AUTO_MERGE=false
      - POSITRON_ENABLE_MERGE=false
      - POSITRON_MERGE_DRY_RUN=true
      - POSITRON_ENABLE_PUSH=false
      - POSITRON_ENABLE_FIX_LOOP=false
      - POSITRON_REPO_OWNER=positron-demo
      - POSITRON_REPO_NAME=positron-demo
      - POSITRON_REPO_DEFAULT_BRANCH=main
      - POSITRON_ENABLE_INFRASTRUCTURE_STATE_UPSERT=false
    volumes:
      - positron-data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http = require('http'); http.get('http://localhost:3000/api/health', (res) => { let d=''; res.on('data', c => d+=c); res.on('end', () => { try { const j=JSON.parse(d); process.exit(j.status==='ok' ? 0 : 1); } catch { process.exit(1); } }); }).on('error', () => process.exit(1));",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  positron-data:
    name: positron-data
