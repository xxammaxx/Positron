# Development & Test Docker Compose
# Verwendung: docker compose -f docker-compose.test.yml up --abort-on-container-exit

services:
  # ─── Test-Runner: Alle Unit/Integration/Contract-Tests ───
  test:
    build:
      context: .
      dockerfile: docker/Dockerfile.test
      target: test
    volumes:
      - test-coverage:/app/coverage
      - test-reports:/app/reports
    environment:
      - POSITRON_GITHUB_MODE=fake
      - POSITRON_SPECKIT_MODE=fake
      - POSITRON_OPENCODE_MODE=fake
      - POSITRON_WORKSPACE_ROOT=/tmp/positron-test
      - CI=true
    # Keine Ports, kein Netzwerk (Unit-Tests)
    network_mode: none
    tmpfs:
      - /tmp:exec,size=512M
    read_only: true

  # ─── Integration-Tests (mit Redis) ───
  integration:
    build:
      context: .
      dockerfile: docker/Dockerfile.test
      target: test
    command: npx vitest run --config vitest.integration.config.ts
    volumes:
      - integration-reports:/app/reports
    environment:
      - POSITRON_GITHUB_MODE=fake
      - POSITRON_SPECKIT_MODE=fake
      - POSITRON_OPENCODE_MODE=fake
      - POSITRON_REDIS_URL=redis://redis:6379
      - CI=true
    depends_on:
      redis:
        condition: service_healthy
    tmpfs:
      - /tmp:exec,size=512M
    read_only: true

  # ─── Contract-Tests für Adapter ───
  contracts:
    build:
      context: .
      dockerfile: docker/Dockerfile.test
      target: test
    command: npx vitest run --config vitest.contracts.config.ts
    volumes:
      - contract-reports:/app/reports
    environment:
      - POSITRON_GITHUB_MODE=fake
      - POSITRON_SPECKIT_MODE=fake
      - POSITRON_OPENCODE_MODE=fake
      - CI=true
    network_mode: none
    tmpfs:
      - /tmp:exec,size=256M
    read_only: true

  # ─── E2E-Tests (mit Server, Web, Redis) ───
  e2e:
    build:
      context: .
      dockerfile: docker/Dockerfile.e2e
    volumes:
      - e2e-reports:/app/playwright-report
      - e2e-results:/app/test-results
    environment:
      - POSITRON_BASE_URL=http://server:3000
      - POSITRON_GITHUB_MODE=fake
      - POSITRON_SPECKIT_MODE=fake
      - POSITRON_OPENCODE_MODE=fake
      - CI=true
    depends_on:
      server:
        condition: service_healthy
      redis:
        condition: service_healthy
    tmpfs:
      - /tmp:exec,size=512M

  # ─── Redis (für Integration/E2E) ───
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    tmpfs:
      - /data:size=128M
    read_only: false

  # ─── Server (für E2E) ───
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      - PORT=3000
      - NODE_ENV=test
      - POSITRON_GITHUB_MODE=fake
      - POSITRON_SPECKIT_MODE=fake
      - POSITRON_OPENCODE_MODE=fake
      - POSITRON_REDIS_URL=redis://redis:6379
      - POSITRON_DB_PATH=/tmp/positron-test.db
      - POSITRON_MERGE_KILL_SWITCH=true
      - POSITRON_ENABLE_PUSH=false
      - POSITRON_ENABLE_MERGE=false
      - POSITRON_ADMIN_TOKEN=positron-test-token
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    tmpfs:
      - /tmp:exec,size=256M

  # ─── Security Scans ───
  security:
    build:
      context: .
      dockerfile: docker/Dockerfile.security
    volumes:
      - security-reports:/app/reports
    network_mode: none

  # ─── Build-Reproduzierbarkeits-Test ───
  reproduce:
    build:
      context: .
      dockerfile: docker/Dockerfile.test
      target: reproduce
    command: |
      sh -c '
        npm ci --ignore-scripts &&
        npm run build &&
        echo "✅ Build reproduzierbar" &&
        npx vitest run --reporter=verbose
      '
    environment:
      - POSITRON_GITHUB_MODE=fake
      - POSITRON_SPECKIT_MODE=fake
      - POSITRON_OPENCODE_MODE=fake
      - CI=true
    network_mode: none
    tmpfs:
      - /tmp:exec,size=512M
    read_only: true

volumes:
  test-coverage:
  test-reports:
  integration-reports:
  contract-reports:
  e2e-reports:
  e2e-results:
  security-reports:
