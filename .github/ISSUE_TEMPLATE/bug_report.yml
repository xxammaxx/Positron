name: Bug report
description: Report reproducible incorrect behavior.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include tokens, `.env` contents, private paths, or sensitive repository data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what should have happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest reliable sequence of steps.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Branch/commit, OS, Node version, mode, and relevant non-secret flags.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Sanitized logs, screenshots, failing tests, or API responses.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed secrets, tokens, private paths, and personal data.
          required: true
