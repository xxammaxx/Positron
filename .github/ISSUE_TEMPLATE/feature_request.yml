name: Feature or enhancement
description: Propose a scoped improvement.
title: "enhancement: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem needs to be solved?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe observable behavior, not only an implementation.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and non-goals
      description: State what is included and explicitly excluded.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Provide testable completion criteria.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety impact
      description: Explain effects on tokens, filesystem access, push, merge, or human approval.
    validations:
      required: true
