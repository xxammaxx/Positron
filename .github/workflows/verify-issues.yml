name: Issue Verification

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [closed]
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 UTC
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Specific issue number to verify (leave empty for all)'
        required: false
        type: string

jobs:
  verify-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      pull-requests: read
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run issue verification
        run: |
          if [ -n "${{ inputs.issue_number }}" ]; then
            node scripts/verify-issues.mjs ${{ inputs.issue_number }}
          else
            node scripts/verify-issues.mjs all
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: issue-verification-report
          path: reports/issue-verification-*.json
          retention-days: 30

      - name: Post summary to workflow
        run: |
          REPORT=$(ls reports/issue-verification-*.json 2>/dev/null | head -1)
          if [ -n "$REPORT" ]; then
            SUMMARY=$(node -e "
              const r = require('./$REPORT');
              console.log('## Issue Verification Summary');
              console.log('| Metric | Count |');
              console.log('|--------|-------|');
              console.log('| Total | ' + r.total + ' |');
              console.log('| ✅ PASS | ' + r.summary.pass + ' |');
              console.log('| ⚠️ PARTIAL | ' + r.summary.partial + ' |');
              console.log('| 📝 No Criteria | ' + r.summary.noCriteria + ' |');
              console.log('| ❌ Error | ' + r.summary.error + ' |');
            ")
            echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY
          fi
