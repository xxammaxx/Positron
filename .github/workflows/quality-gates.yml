name: Quality Gates

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format check (Biome)
        run: npx biome format .

      - name: Lint (Biome)
        run: npx biome lint .

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Unit Tests
        run: npm test

  # ── #223: Tool Gateway Windows Path Tests (non-blocking) ──────
  # Runs path traversal tests on Windows to validate cross-platform
  # path separator handling (backslash vs forward slash).
  tool-gateway-windows:
    runs-on: windows-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build dependencies
        run: npm run build

      - name: Run Tool Gateway tests
        run: npx vitest run
        working-directory: packages/tool-gateway

  observability-config-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose Config
        run: |
          python3 -c "import yaml; yaml.safe_load(open('observability/prometheus/prometheus.yml'))" && echo "✅ prometheus.yml valid YAML"
          python3 -c "import yaml; yaml.safe_load(open('observability/prometheus/alerts.yml'))" && echo "✅ alerts.yml valid YAML"
          python3 -c "import yaml; yaml.safe_load(open('observability/alertmanager/alertmanager.yml'))" && echo "✅ alertmanager.yml valid YAML"

      - name: Validate Prometheus Config (promtool)
        continue-on-error: true
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/observability/prometheus/prometheus.yml:/tmp/prometheus.yml:ro \
            -v ${{ github.workspace }}/observability/prometheus/alerts.yml:/tmp/alerts.yml:ro \
            --entrypoint promtool \
            prom/prometheus:v3.5.0 check config /tmp/prometheus.yml

      - name: Validate Alert Rules (promtool)
        continue-on-error: true
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/observability/prometheus/alerts.yml:/tmp/alerts.yml:ro \
            --entrypoint promtool \
            prom/prometheus:v3.5.0 check rules /tmp/alerts.yml

      - name: Validate Alertmanager Config (amtool)
        continue-on-error: true
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/observability/alertmanager/alertmanager.yml:/tmp/alertmanager.yml:ro \
            --entrypoint amtool \
            prom/alertmanager:v0.28.0 check-config /tmp/alertmanager.yml

  mutation-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages (required for Stryker)
        run: npm run build

      - name: Ensure test results directory
        run: mkdir -p test-results

      - name: Run fast mutation tests (Stryker)
        run: npm run test:mutation:fast

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-fast-report
          path: |
            reports/mutation/**
          if-no-files-found: warn

  # ── QA-007: Mutation Safety Baseline (non-blocking) ──────────────
  # Targets 7 safety-critical modules only. Fast runtime (~34s).
  # Non-blocking: baseline only — will be hardened in QA-008.
  mutation-safety:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages (required for Stryker)
        run: npm run build

      - name: Ensure test results directory
        run: mkdir -p test-results

      - name: Run safety mutation tests (Stryker)
        run: npm run test:mutation:safety

      - name: Upload mutation safety report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-safety-report
          path: |
            reports/mutation/safety-baseline/**
          if-no-files-found: warn

  # ── QA-030: Playwright E2E (non-blocking, optional) ─────────────
  # Non-blocking until E2E stability window completed:
  #   Criteria: ≥ 5 consecutive green runs on main
  #   Tracked in: docs/qa-tooling.md#e2e-stability-window
  #   After 5/5: promote to blocking (continue-on-error: false)
  e2e-playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages (required for server webServer via tsx)
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          # Fake/Safety-Env — no real tokens, no external API calls
          VITEST: 'true'
          NODE_ENV: test
          POSITRON_DISABLE_QUEUE: 'true'
          POSITRON_GITHUB_MODE: fake
          POSITRON_OPENCODE_MODE: fake
          POSITRON_SPECKIT_MODE: fake
          GITHUB_TOKEN: ''
          # Repository config (fake mode requires these)
          POSITRON_REPO_OWNER: test-owner
          POSITRON_REPO_NAME: test-repo
          POSITRON_REPO_DEFAULT_BRANCH: main
          # Admin token (used for protected endpoints in test mode)
          POSITRON_ADMIN_TOKEN: positron-admin-dev

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/**
            test-results/**
          if-no-files-found: warn
