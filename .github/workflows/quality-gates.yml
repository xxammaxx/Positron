name: Quality Gates

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Unit Tests
        run: npm test

  observability-config-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose Config
        run: |
          python3 -c "import yaml; yaml.safe_load(open('observability/prometheus/prometheus.yml'))" && echo "✅ prometheus.yml valid YAML"
          python3 -c "import yaml; yaml.safe_load(open('observability/prometheus/alerts.yml'))" && echo "✅ alerts.yml valid YAML"
          python3 -c "import yaml; yaml.safe_load(open('observability/alertmanager/alertmanager.yml'))" && echo "✅ alertmanager.yml valid YAML"

      # QA-035: Docker-dependent checks are non-blocking.
      # promtool and amtool require a running Docker daemon which may
      # not be available on all CI runners. YAML syntax validation
      # (above) still catches config errors.
      - name: Validate Prometheus Config (promtool)
        continue-on-error: true
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/observability/prometheus/prometheus.yml:/tmp/prometheus.yml:ro \
            -v ${{ github.workspace }}/observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro \
            --entrypoint promtool \
            prom/prometheus:v3.5.0 check config /tmp/prometheus.yml \
            || echo "⚠️  promtool skipped (Docker unavailable)"

      - name: Validate Alert Rules (promtool)
        continue-on-error: true
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/observability/prometheus/alerts.yml:/tmp/alerts.yml:ro \
            --entrypoint promtool \
            prom/prometheus:v3.5.0 check rules /tmp/alerts.yml \
            || echo "⚠️  promtool rules check skipped (Docker unavailable)"

      - name: Validate Alertmanager Config (amtool)
        continue-on-error: true
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/observability/alertmanager/alertmanager.yml:/tmp/alertmanager.yml:ro \
            --entrypoint amtool \
            prom/alertmanager:v0.28.0 check-config /tmp/alertmanager.yml \
            || echo "⚠️  amtool skipped (Docker unavailable)"

  mutation-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages (required for cross-package imports)
        run: npm run build

      # QA-035/L3-T2: Stryker sandbox ENOENT fix.
      # Stryker copies workspace files into a sandbox directory and fails
      # when test-results/.last-run.json or reports/mutation/ don't exist yet.
      - name: Ensure Stryker artifact directories exist
        run: |
          mkdir -p test-results reports/mutation
          touch test-results/.last-run.json

      - name: Run fast mutation tests (Stryker)
        run: npm run test:mutation:fast

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-fast-report
          path: |
            reports/mutation/**
          if-no-files-found: warn

  # ── QA-030: Playwright E2E (non-blocking, optional) ─────────────
  # This job runs the full browser-based run lifecycle test.
  # It is intentionally non-blocking until proven stable across
  # multiple CI runs (see stability window criteria in docs/qa-tooling.md).
  e2e-playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages (required for server webServer via tsx)
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          # Fake/Safety-Env — no real tokens, no external API calls
          VITEST: 'true'
          NODE_ENV: test
          POSITRON_DISABLE_QUEUE: 'true'
          POSITRON_GITHUB_MODE: fake
          POSITRON_OPENCODE_MODE: fake
          POSITRON_SPECKIT_MODE: fake
          GITHUB_TOKEN: ''
          # Repository config (fake mode requires these)
          POSITRON_REPO_OWNER: test-owner
          POSITRON_REPO_NAME: test-repo
          POSITRON_REPO_DEFAULT_BRANCH: main
          # Admin token (used for protected endpoints in test mode)
          POSITRON_ADMIN_TOKEN: positron-admin-dev

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/**
            test-results/**
          if-no-files-found: warn

      - name: Upload E2E Screenshots (for AI UI Review)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: |
            test-results/**/*.png
            playwright-report/**/*.png
          if-no-files-found: warn

  # ── L2c: SonarQube Quality Gate (opt-in, optional) ────────────
  # This job runs the SonarScanner and checks the quality gate.
  # It only executes when SONAR_HOST_URL and SONAR_TOKEN are configured.
  # Otherwise, it gracefully skips (non-blocking).
  #
  # Layer 2c — Issue #169
  sonarqube-quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    if: github.event_name != 'workflow_dispatch' || vars.SONAR_HOST_URL != ''
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Tests with Coverage (LCOV)
        run: npm test
        env:
          NODE_ENV: test
          VITEST: 'true'

      - name: Run SonarScanner
        if: env.SONAR_TOKEN != ''
        run: npx sonarqube-scanner
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'http://localhost:9000' }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN || '' }}

      - name: Check Quality Gate
        if: env.SONAR_TOKEN != ''
        run: node scripts/sonarqube-quality-gate.mjs
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'http://localhost:9000' }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN || '' }}

      - name: Upload SonarQube Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-report
          path: |
            .scannerwork/**
            coverage/lcov.info
          if-no-files-found: warn

  # ── L7: Evidence Collection (depends on all artifact producers) ──
  # Collects all test/scan artifacts into a single evidence report
  # and posts it to the default evidence issue (#165).
  #
  # Layer 7 — Issue #173
  evidence-collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    needs: [build-and-test, e2e-playwright, mutation-fast]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download Build & Test Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./evidence-artifacts
        continue-on-error: true

      - name: Collect Evidence
        run: node scripts/collect-evidence.mjs
        env:
          POSITRON_EVIDENCE_ISSUE: '165'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: 'true'
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}

  # ── L5: AI UI Review (post-E2E, non-blocking) ───────────────
  # Runs after E2E tests complete. Downloads screenshots and sends
  # them to an LLM provider for visual specification comparison.
  # Gracefully skips when no AI provider is configured.
  #
  # Layer 5 — Issue #172
  ai-ui-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    needs: [e2e-playwright]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download E2E Screenshots
        uses: actions/download-artifact@v4
        with:
          name: e2e-screenshots
          path: ./e2e-screenshots
        continue-on-error: true

      - name: AI UI Review
        run: node scripts/ai-ui-review.mjs
        env:
          AI_UI_PROVIDER: ${{ secrets.AI_UI_PROVIDER || 'none' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || '' }}
          CI: 'true'
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POSITRON_EVIDENCE_ISSUE: '165'

      - name: Skip Notice (no provider)
        if: env.AI_UI_PROVIDER == '' || env.AI_UI_PROVIDER == 'none'
        run: echo "ℹ️  AI UI Review skipped — no AI_UI_PROVIDER configured."
