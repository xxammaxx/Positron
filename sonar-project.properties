# SonarQube Project Configuration
# Layer 2c (Issue #169) — Quality Gate
#
# Required for SonarScanner CLI analysis.
# Install: npm install -g sonarqube-scanner (or use npx)
#
# Usage (local):
#   npx sonarqube-scanner \
#     -Dsonar.host.url=http://localhost:9000 \
#     -Dsonar.token=<your-token>
#
# Usage (CI):
#   The quality-gates.yml workflow runs the scanner using SONAR_* secrets.

# Project identity
sonar.projectKey=positron
sonar.projectName=Positron
sonar.projectVersion=0.1.0

# Source code
sonar.sources=apps/server/src,apps/web/src,packages/shared/src,packages/github-adapter/src,packages/run-state/src,packages/sandbox/src,packages/speckit-adapter/src,packages/opencode-adapter/src
sonar.tests=apps/server/src/__tests__,apps/web/src/__tests__,packages/shared/src/__tests__,packages/github-adapter/src/__tests__,packages/run-state/src/__tests__,packages/sandbox/src/__tests__,packages/speckit-adapter/src/__tests__,packages/opencode-adapter/src/__tests__,e2e

# Language
sonar.language=ts
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.*,**/*.spec.*,**/__tests__/**,**/test-results/**,**/playwright-report/**,**/reports/**,**/.positron/**,**/.specify/**,**/.stryker-tmp/**
sonar.coverage.exclusions=**/*.test.*,**/*.spec.*,**/__tests__/**,**/vitest.config.*,**/playwright.config.*,**/stryker.config.*

# Coverage (LCOV from Vitest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Test execution reports (JUnit XML)
sonar.testExecutionReportPaths=test-results/junit.xml

# TypeScript configuration
sonar.typescript.tsconfigPath=tsconfig.json

# Quality Gate — defined in SonarQube UI, enforced via sonarqube-quality-gate.mjs
# The script polls /api/qualitygates/project_status and fails if status is ERROR.
