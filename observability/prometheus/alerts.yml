# Positron Prometheus Alert Rules
# QA-013 — Observability Foundation
#
# WARNING: Thresholds are initial estimates. Calibrate with production data.
# All `for` durations are intentionally short for local development.
# Increase to 5m+ for production.

groups:
  - name: positron-critical
    rules:
      # ── Server Health ────────────────────────────────────────────
      - alert: PositronServerDown
        expr: up{job="positron-server"} == 0
        for: 1m
        labels:
          severity: critical
          component: server
        annotations:
          summary: "Positron server is down"
          description: "The Positron server at {{ $labels.instance }} has been unreachable for 1 minute."
          runbook_url: "docs/runbooks/positron-server-down.md"

      # ── Redis / Queue Health ─────────────────────────────────────
      - alert: RedisDown
        expr: positron_queue_redis_up == 0
        for: 1m
        labels:
          severity: critical
          component: redis
        annotations:
          summary: "Redis is unreachable"
          description: "Redis connectivity check failed. Queue operations are degraded."
          runbook_url: "docs/runbooks/redis-down.md"

      - alert: WorkerDown
        expr: positron_queue_worker_up{queue="positron-pipeline"} == 0
        for: 2m
        labels:
          severity: critical
          component: worker
        annotations:
          summary: "No active pipeline workers"
          description: "No BullMQ workers are connected to the 'positron-pipeline' queue. Runs are not being processed."
          runbook_url: "docs/runbooks/worker-down.md"

      # ── Run Failure Rate ─────────────────────────────────────────
      - alert: HighRunFailureRate
        expr: rate(positron_run_failures_total[15m]) / rate(positron_runs_total[15m]) > 0.3
        for: 5m
        labels:
          severity: critical
          component: pipeline
        annotations:
          summary: "High run failure rate ({{ $value | humanizePercentage }})"
          description: "More than 30% of runs are failing. Check recent errors and logs."
          runbook_url: "docs/runbooks/high-run-failure-rate.md"

      # ── Queue Backlog ────────────────────────────────────────────
      - alert: QueueBacklogCritical
        expr: positron_queue_jobs_waiting{queue="positron-pipeline"} > 50
        for: 5m
        labels:
          severity: critical
          component: queue
        annotations:
          summary: "Queue backlog critical: {{ $value }} jobs waiting"
          description: "More than 50 jobs are waiting in the positron-pipeline queue. Check worker health and redis connectivity."
          runbook_url: "docs/runbooks/queue-backlog-critical.md"

  # ── Observability Drill Alerts (QA-018) ───────────────────────
  # Separate alert group for isolated test-queue validation.
  # Only fires in local observability drill — never in production.
  - name: positron-drill
    rules:
      - alert: QueueBacklogCriticalDrill
        expr: positron_queue_jobs_waiting{queue="positron-observability-drill"} > 50
        for: 30s
        labels:
          severity: warning
          component: queue
          drill: "true"
        annotations:
          summary: "Observability drill: queue backlog > {{ $value }} jobs (test queue)"
          description: "QueueBacklogCritical drill is active. This validates the alerting pipeline — not a production incident."
          runbook_url: "docs/runbooks/queue-backlog-critical.md"

  - name: positron-warning
    rules:
      # ── GitHub API ───────────────────────────────────────────────
      - alert: GitHubRateLimitHit
        expr: rate(positron_github_rate_limit_hits_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
          component: github
        annotations:
          summary: "GitHub rate limit hit detected"
          description: "GitHub API rate limit was reached. Requests may be throttled."
          runbook_url: "docs/runbooks/github-rate-limit.md"

      # ── OpenCode Health ──────────────────────────────────────────
      - alert: HighOpenCodeFailureRate
        expr: |
          rate(positron_opencode_command_failures_total[15m])
          / rate(positron_opencode_command_total[15m]) > 0.25
        for: 5m
        labels:
          severity: warning
          component: opencode
        annotations:
          summary: "High OpenCode command failure rate ({{ $value | humanizePercentage }})"
          description: "More than 25% of OpenCode commands are failing."
          runbook_url: "docs/runbooks/high-opencode-failure-rate.md"

      # ── Retry Rate ───────────────────────────────────────────────
      - alert: HighRetryRate
        expr: rate(positron_retries_total[15m]) > 0.1
        for: 5m
        labels:
          severity: warning
          component: pipeline
        annotations:
          summary: "Elevated retry rate: {{ $value }} retries/second"
          description: "Runs are being retried more frequently than expected."
          runbook_url: "docs/runbooks/high-run-failure-rate.md"

      # ── Run Duration ─────────────────────────────────────────────
      - alert: LongRunDuration
        expr: histogram_quantile(0.95, rate(positron_run_duration_seconds_bucket[1h])) > 600
        for: 10m
        labels:
          severity: warning
          component: pipeline
        annotations:
          summary: "Long run duration: p95 = {{ $value }}s"
          description: "95th percentile run duration exceeds 10 minutes. Check pipeline performance."
          runbook_url: "docs/runbooks/high-run-failure-rate.md"

      # ── Queue Backlog Growing ────────────────────────────────────
      - alert: QueueBacklogGrowing
        expr: deriv(positron_queue_jobs_waiting{queue="positron-pipeline"}[10m]) > 0.5
        for: 10m
        labels:
          severity: warning
          component: queue
        annotations:
          summary: "Queue backlog is growing"
          description: "The number of waiting jobs is increasing. Worker may be falling behind."
          runbook_url: "docs/runbooks/queue-backlog-critical.md"
