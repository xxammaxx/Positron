# Positron Prometheus Scrape Configuration
# QA-013 — Observability Foundation
#
# Usage:
#   docker compose -f docker-compose.observability.yml up
#   promtool check config observability/prometheus/prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  # No external labels — keep clean for local development

# Alerting rules
rule_files:
  - "/etc/prometheus/alerts.yml"

# Scrape configurations
scrape_configs:
  - job_name: "positron-server"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["server:3000"]
        labels:
          service: "positron"
          component: "server"

  # Self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
