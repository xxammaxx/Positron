# SonarQube Community Edition — Local Quality Analysis
# Layer 2c (Issue #169)
#
# Usage:
#   docker compose -f docker-compose.sonarqube.yml up -d
#   docker compose -f docker-compose.sonarqube.yml down
#
# First access: http://localhost:9000
# Default credentials: admin / admin
# You will be prompted to change the password on first login.
#
# Requirements:
#   - Docker Engine 20.10+
#   - vm.max_map_count >= 262144 (Linux hosts: sudo sysctl -w vm.max_map_count=262144)
#   - Docker Compose v2
#
# Note: This is for LOCAL development and manual QA only.
# CI integration uses the sonarqube-quality-gate job in quality-gates.yml
# which requires a reachable SonarQube instance and SONAR_* secrets.
#
# Free tier: SonarQube Community Edition (OSS, no user limits)
# Docker image: sonarqube:community (official Docker Hub)

services:
  sonarqube:
    image: sonarqube:community
    container_name: positron-sonarqube
    depends_on:
      sonarqube-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonarqube
      SONAR_JDBC_PASSWORD: sonarqube
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/api/system/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  sonarqube-db:
    image: postgres:15-alpine
    container_name: positron-sonarqube-db
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: sonarqube
      POSTGRES_PASSWORD: sonarqube
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonarqube -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_db_data:
